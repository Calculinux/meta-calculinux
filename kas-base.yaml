# https://github.com/siemens/kas/blob/master/docs/userguide.rst
header:
  version: 18

distro: calculinux-distro

# whinlatter checkout (split Poky: bitbake + openembedded-core + meta-yocto)
# bitbake must be sibling to openembedded-core (oe-init-build-env looks for ../bitbake)
repos:
  bitbake:
    url: https://git.openembedded.org/bitbake
    tag: yocto-5.3.1
    layers:
      .: disabled
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    branch: whinlatter
    patches:
      0001-compress-doc.patch:
        repo: meta-calculinux
        path: patches/compress_doc.patch
    layers:
      meta:
  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    branch: whinlatter
    layers:
      meta-poky:
  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: whinlatter
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:
      meta-multimedia:
  meta-retro:
    url: https://github.com/dev-0x7C6/meta-retro.git
    branch: master
    layers:
      .:
    patches:
      0001-meta-retro-whinlatter-compat.patch:
        repo: meta-calculinux
        path: patches/meta-retro-whinlatter-compat.patch
  meta-wayland:
    url: https://codeberg.org/flk/meta-wayland.git
    branch: walnascar
    layers:
      .:
    patches:
      0001-meta-wayland-whinlatter-compat.patch:
        repo: meta-calculinux
        path: patches/meta-wayland-whinlatter-compat.patch
  meta-calculinux:
    layers:
      meta-calculinux-distro:

local_conf_header:
  standard: |
    PATCHRESOLVE = "noop"
    PACKAGE_CLASSES = "package_ipk"
    RM_OLD_IMAGE = "1"
    INHERIT += "rm_work"
  meta-retro-fixes: |
    # Skip problematic recipes from meta-retro that use AUTOREV or have missing dependencies
    BBMASK += "meta-retro/recipes-extended/slipr"
    BBMASK += "meta-retro/recipes-graphics/mesa"
  rust-version: |
    # Use meta-lts-mixins' Scarthgap Rust mixin toolchain
    PREFERRED_VERSION_rust = "1.92%"
    PREFERRED_VERSION_rust-native = "1.92%"
    PREFERRED_VERSION_cargo = "1.92%"
    PREFERRED_VERSION_cargo-native = "1.92%"
    PREFERRED_VERSION_libstd-rs = "1.92%"
  diskmon: |
    BB_DISKMON_DIRS ??= "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"
