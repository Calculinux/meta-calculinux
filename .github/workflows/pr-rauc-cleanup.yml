name: Cleanup PR RAUC Bundles

on:
  pull_request:
    branches: [ main ]
    types: [closed]

env:
  OPKG_REPO_DIR: /mnt/opkg-repo
  UPDATE_BASE_URL: https://opkg.calculinux.org

permissions:
  contents: read

jobs:
  cleanup:
    name: Remove PR RAUC artifacts
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        machine: [luckfox-lyra]
        include:
          - machine: luckfox-lyra
            kas_file: "kas-luckfox-lyra-bundle.yaml"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine feed configuration
      id: feed-config
      run: |
        set -euo pipefail
        # For PR cleanup, we need to determine the feed name from the base branch
        # PRs target main, so we check what feed main would use
        bash .github/scripts/load-script-output.sh -- bash .github/scripts/determine-feed-config.sh \
          "${{ matrix.kas_file }}" \
          "main" \
          "branch"

    - name: Remove PR bundle and refresh index
      run: |
        set -euo pipefail
        bash .github/scripts/cleanup-pr-bundle.sh \
          "${{ matrix.machine }}" \
          "${{ github.event.pull_request.number }}" \
          "$OPKG_REPO_DIR" \
          "${{ steps.feed-config.outputs.feed_name }}" \
          "$UPDATE_BASE_URL"
