name: Build Calculinux Images

# Required Secrets:
# - OPKG_REPO_TOKEN: Personal Access Token with 'repo' scope to push to Calculinux/opkg-repo
#   Create at: https://github.com/settings/tokens (classic token with 'repo' scope)
#   Add to: Repository Settings > Secrets and variables > Actions > New repository secret

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Yocto build directories that need persistent storage
  DL_DIR: ${{ github.workspace }}/../yocto-cache/downloads
  SSTATE_DIR: ${{ github.workspace }}/../yocto-cache/sstate-cache

permissions:
  contents: write  # Needed for creating releases
  packages: write # Needed for uploading artifacts

jobs:
  build:
    name: Build Yocto Images
    runs-on: [self-hosted, Linux, X64]
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Luckfox Lyra Bundle"
            kas_file: "kas-luckfox-lyra-bundle.yaml"
            target: "picocalc-bundle"
            machine: "luckfox-lyra"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up build environment
      run: |
        # Create cache directories if they don't exist
        mkdir -p $DL_DIR $SSTATE_DIR
        
        # Clean up any leftover containers and images from previous builds
        docker system prune -f || true
        
        # Show disk space before build
        df -h

    - name: Build Yocto image
      run: |
        echo "Building ${{ matrix.config.name }} using ${{ matrix.config.kas_file }}"
        
        # Run the build with kas-container
        ./kas-container build ${{ matrix.config.kas_file }}

    - name: Collect build artifacts
      run: |
        echo "Collecting build artifacts..."
        
        # Find the build directory
        BUILD_DIR=$(find build -name "tmp" -type d | head -1 | sed 's|/tmp||')
        DEPLOY_DIR="${BUILD_DIR}/tmp/deploy/images/${{ matrix.config.machine }}"
        
        echo "Deploy directory: $DEPLOY_DIR"
        
        if [ -d "$DEPLOY_DIR" ]; then
          # Create artifacts directory
          mkdir -p artifacts
          
          # Copy image files
          find "$DEPLOY_DIR" -name "*.wic.gz" -o -name "*.wic.bz2" -o -name "*.wic.xz" | \
            xargs -I {} cp {} artifacts/ || true
          
          # Copy update bundles (RAUC bundles)
          find "$DEPLOY_DIR" -name "*.raucb" | \
            xargs -I {} cp {} artifacts/ || true
          
          # Copy other important files
          find "$DEPLOY_DIR" -name "*.manifest" -o -name "*.testdata.json" | \
            xargs -I {} cp {} artifacts/ || true
          
          # List what we collected
          echo "Collected artifacts:"
          ls -la artifacts/
        else
          echo "Deploy directory not found: $DEPLOY_DIR"
          echo "Available directories:"
          find build -type d -name "deploy" || true
        fi

    - name: Generate build information
      run: |
        # Create build info file
        cat > artifacts/build-info.txt << EOF
        Build Information
        =================
        Repository: ${{ github.repository }}
        Commit: ${{ github.sha }}
        Branch/Tag: ${{ github.ref_name }}
        Build Date: $(date -u)
        Configuration: ${{ matrix.config.name }}
        Machine: ${{ matrix.config.machine }}
        Target: ${{ matrix.config.target }}
        Kas File: ${{ matrix.config.kas_file }}
        Dockerfile: ${{ matrix.config.dockerfile }}
        Workflow: ${{ github.workflow }}
        Run Number: ${{ github.run_number }}
        EOF
        
        # Add git information if available
        if git log -1 --format="%H %s" >> artifacts/build-info.txt 2>/dev/null; then
          echo "Last Commit: $(git log -1 --format='%H %s')" >> artifacts/build-info.txt
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: calculinux-${{ matrix.config.machine }}-${{ github.run_number }}
        path: artifacts/
        retention-days: 30

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

    - name: Show disk space after build
      if: always()
      run: |
        echo "Disk space after build:"
        df -h
        
        echo "Cache directory sizes:"
        du -sh $DL_DIR $SSTATE_DIR || true

    - name: Cleanup
      if: always()
      run: |
        # Clean up build directory but preserve caches
        rm -rf build/tmp/work/* || true
        
        # Clean up docker containers and images
        docker system prune -f || true
        
        # Remove our custom image to save space
        docker rmi kas-custom:latest || true

  build-apps:
    name: Build and Publish Apps
    runs-on: [self-hosted, Linux, X64]
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout meta-calculinux repository
      uses: actions/checkout@v4
      with:
        path: meta-calculinux
        fetch-depth: 0

    - name: Checkout opkg-repo repository
      uses: actions/checkout@v4
      with:
        repository: Calculinux/opkg-repo
        # NOTE: GITHUB_TOKEN cannot push to other repos. You need to create a Personal Access Token
        # with 'repo' scope and store it as OPKG_REPO_TOKEN secret in repository settings.
        # Go to: Settings > Secrets and variables > Actions > New repository secret
        # Name: OPKG_REPO_TOKEN
        # Value: Your PAT with 'repo' scope from https://github.com/settings/tokens
        token: ${{ secrets.OPKG_REPO_TOKEN }}
        path: opkg-repo
        fetch-depth: 0

    - name: Determine feed path and version suffix
      id: feed-config
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          # Use distro codename for stable releases (e.g., walnascar, scarthgap)
          # Extract from build environment
          cd meta-calculinux
          DISTRO_CODENAME=$(./kas-container shell kas-luckfox-lyra-bundle.yaml -c "bitbake -e | grep '^DISTRO_CODENAME=' | cut -d'\"' -f2")
          echo "feed_path=ipk/${DISTRO_CODENAME}" >> $GITHUB_OUTPUT
          echo "version_suffix=" >> $GITHUB_OUTPUT
          echo "feed_name=${DISTRO_CODENAME}" >> $GITHUB_OUTPUT
        else
          # Use "develop" for all development builds regardless of base distro
          echo "feed_path=ipk/develop" >> $GITHUB_OUTPUT
          echo "version_suffix=+dev.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "feed_name=develop" >> $GITHUB_OUTPUT
        fi
        echo "Feed: $([ "${{ github.ref_name }}" = "main" ] && echo "${DISTRO_CODENAME} (ipk/${DISTRO_CODENAME}/)" || echo "develop (ipk/develop/)")"

    - name: Build apps package group
      env:
        # Add development version suffix for develop branch builds
        DISTRO_VERSION_SUFFIX: ${{ steps.feed-config.outputs.version_suffix }}
      run: |
        cd meta-calculinux
        echo "Building packagegroup-meta-calculinux-apps for ${{ steps.feed-config.outputs.feed_name }} feed..."
        
        # If we have a version suffix, pass it to the build via local.conf
        if [ -n "$DISTRO_VERSION_SUFFIX" ]; then
          echo "Adding version suffix: $DISTRO_VERSION_SUFFIX"
          # Create a build configuration override
          mkdir -p build/conf
          echo "DISTRO_VERSION:append = \"$DISTRO_VERSION_SUFFIX\"" >> build/conf/auto.conf
        fi
        
        ./kas-container build kas-luckfox-lyra-apps.yaml

    - name: Sync packages to opkg-repo
      run: |
        # Find the deploy/ipk directory
        BUILD_DIR=$(find meta-calculinux/build -name "tmp" -type d | head -1)
        DEPLOY_IPK_DIR="${BUILD_DIR}/deploy/ipk"
        
        echo "Deploy IPK directory: $DEPLOY_IPK_DIR"
        
        if [ ! -d "$DEPLOY_IPK_DIR" ]; then
          echo "Error: Deploy IPK directory not found"
          exit 1
        fi
        
        # Sync packages to the appropriate feed directory
        FEED_PATH="${{ steps.feed-config.outputs.feed_path }}"
        echo "Syncing to feed: $FEED_PATH"
        
        cd opkg-repo
        
        # Create feed directory if it doesn't exist
        mkdir -p "$FEED_PATH"
        
        # Sync packages - we'll copy architecture directories
        for arch_dir in "$DEPLOY_IPK_DIR"/*/; do
          if [ -d "$arch_dir" ]; then
            arch=$(basename "$arch_dir")
            echo "  Syncing architecture: $arch"
            
            # Create target directory
            target_dir="$FEED_PATH/$arch"
            mkdir -p "$target_dir"
            
            # Copy IPK files
            cp "$arch_dir"/*.ipk "$target_dir/" 2>/dev/null || true
          fi
        done
        
        # Update package indexes for this feed
        echo "Updating package indexes for $FEED_PATH..."
        for arch_dir in "$FEED_PATH"/*/; do
          if [ -d "$arch_dir" ]; then
            arch=$(basename "$arch_dir")
            echo "  Generating index for $arch..."
            cd "$arch_dir"
            
            # Use opkg-make-index if available, otherwise create basic index
            if command -v opkg-make-index >/dev/null 2>&1; then
              opkg-make-index . > Packages
            else
              # Basic index generation - just list files
              echo "# Package index for $arch (${{ steps.feed-config.outputs.feed_name }} feed)" > Packages
              echo "# Generated on $(date -u)" >> Packages
              echo "" >> Packages
            fi
            
            # Create compressed version
            gzip -c Packages > Packages.gz
            
            cd ../..
          fi
        done

    - name: Commit and push packages
      run: |
        cd opkg-repo
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all changes for this feed
        git add ${{ steps.feed-config.outputs.feed_path }}/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No package changes to commit"
        else
          # Commit with build information
          git commit -m "Update ${{ steps.feed-config.outputs.feed_name }} packages from build #${{ github.run_number }}

          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Workflow: ${{ github.workflow }}
          Feed: ${{ steps.feed-config.outputs.feed_path }}"
          
          # Push changes
          git push
          
          echo "Packages pushed successfully!"
        fi

  cleanup-runner:
    name: Cleanup Runner
    runs-on: [self-hosted, Linux, X64]
    needs: [build, build-apps]
    if: always()
    steps:
    - name: Deep cleanup
      run: |
        # Remove any leftover build artifacts from workspace
        rm -rf artifacts/ || true
        rm -rf meta-calculinux/ || true
        rm -rf opkg-repo/ || true
        
        # Docker cleanup
        docker system prune -af || true
        docker volume prune -f || true
        
        # Show final disk space
        echo "Final disk space:"
        df -h