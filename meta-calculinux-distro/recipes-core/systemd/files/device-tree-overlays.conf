# List of device tree overlays to apply.
#
# Default behavior in Calculinux is to MERGE the overlays into the boot DTB/FIT
# for the NEXT boot (see merge-dt-overlays-boot). Changes require a reboot.
#
# Format:
# - one overlay per line
# - blank lines and lines starting with # are ignored
# - entries may be:
#   - an overlay name (with or without .dtbo), resolved in /etc/devicetree/ then /boot/devicetree/
#   - an absolute path to a .dtbo file
#
# Examples:
# ds3231-rtc
# sx1262-lora

